<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
    <pre id="output"></pre>
    <script src="../config.js"></script>
    <script src="../save-manager.js"></script>
    <script src="../economy-manager.js"></script>
    <script src="../mission-controller.js"></script>
    <script src="../game.js"></script>
    <script>
        const out = document.getElementById('output');
        function log(msg) { out.innerText += msg + "\n"; }
        
        window.gameAudio = { playClick: () => {}, playUnlock: () => {}, playChaChing: () => {} };
        window.localStorage = { getItem: () => null, setItem: () => {} };
        
        try {
            const game = new IdleBankGame();
            log("Starting branch: " + game.state.currentBranch);

            game.state.cash = 2500000;
            game.state.lifetimeCash = 2500000;
            let success = game.prestige(1, false, false);
            log("Prestige to branch 2 with 2.5M cash: " + (success ? "SUCCESS" : "FAILED"));
            log("Shares: " + game.state.shares);

            game.state.cash = 250000000000;
            game.state.lifetimeCash = 250000000000;
            success = game.prestige(3, false, false);
            log("Prestige to branch 4 with 250B cash: " + (success ? "SUCCESS" : "FAILED"));
            log("Shares: " + game.state.shares);

            game.state.cash = 100000000000000;
            game.state.lifetimeCash = 100000000000000;
            success = game.prestige(4, false, false);
            log("Prestige to branch 5 with 100T cash: " + (success ? "SUCCESS" : "FAILED"));
            log("Shares: " + game.state.shares);
        } catch(e) {
            log("ERROR: " + e.message);
        }
    </script>
</body>
</html>
